<!DOCTYPE html>
<html>
<head>
  <title>Weather App</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #f0f8ff;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      font-size: 16px;
    }

    button {
      background: blue;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: darkblue;
    }

    #chartContainer {
      width: 600px;
      height: 350px;
      margin: auto;
    }

    #cityName {
      margin-top: 10px;
      color: #444;
    }
  </style>
</head>

<body>

<h3>24WH1A0577_AFIAREFAL</h3>
<h2>Weather App</h2>

<input type="text" id="city" placeholder="Enter city">
<button onclick="getWeather()">Get Weather</button>

<h3 id="cityName"></h3>

<br><br>

<div id="chartContainer">
  <canvas id="weatherChart"></canvas>
</div>

<script>
const apiKey = "e2d00c175c6c86e742794e34b81bcf17";//your API key
let chart;

// Async function
const getWeather = async () => {
  const city = document.getElementById("city").value;

  if (!city) {
    alert("Please enter a city name");
    return;
  }

  try {
    const response = await fetch(
      `https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${apiKey}&units=metric`
    );

    const data = await response.json();

    if (data.cod !== "200") {
      alert("Error: " + data.message);
      return;
    }

    document.getElementById("cityName").innerText =
      "Weather Forecast for " + data.city.name;

    processWeather(data, displayGraph);

  } catch (error) {
    console.error("Error:", error);
    alert("Something went wrong!");
  }
};

// Callback
const processWeather = (data, callback) => {
  const temps = data.list.slice(0, 8).map(item => item.main.temp);

  const labels = data.list.slice(0, 8).map(item =>
    item.dt_txt.split(" ")[1]
  );

  callback(labels, temps);
};

// Promise example
const fakePromise = () => {
  return new Promise(resolve => {
    resolve("Promise executed");
  });
};
fakePromise().then(console.log);

// Chart display
const displayGraph = (labels, temps) => {
  const ctx = document.getElementById("weatherChart").getContext("2d");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "Temperature (°C)",
        data: temps,
        borderWidth: 2,
        backgroundColor: "rgba(75,192,192,0.2)",
        borderColor: "blue",
        fill: true,
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false
    }
  });
};
</script>

</body>
</html>
